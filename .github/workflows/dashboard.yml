name: Dashboard

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dream-server/extensions/services/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dream-server/extensions/services/dashboard-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: API Syntax Check
        run: python -m py_compile main.py agent_monitor.py

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Run Unit Tests
        run: pytest tests/ -v
