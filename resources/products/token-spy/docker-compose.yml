# Token Spy — Multi-Container Deployment
# Transparent LLM API proxy for monitoring token usage and costs.
#
# Quick Start:
#   cp .env.example .env
#   # Edit .env with your settings
#   docker compose up -d
#
# Endpoints:
#   - Proxy:     http://localhost:8080 (point your LLM clients here)
#   - Dashboard: http://localhost:3001
#   - API:       http://localhost:8000/docs

services:
  # ============================================
  # Token Spy Proxy — Transparent API Interceptor
  # ============================================
  token-spy-proxy:
    build:
      context: .
      dockerfile: sidecar/Dockerfile
    container_name: token-spy-proxy
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://token_spy:${POSTGRES_PASSWORD}@token-spy-db:5432/token_spy
      - REDIS_URL=redis://token-spy-redis:6379/0
      - PROXY_PORT=8080
      - PROXY_HOST=0.0.0.0
      - DEFAULT_UPSTREAM_URL=${DEFAULT_UPSTREAM_URL:-http://host.docker.internal:8000/v1}
      - DEFAULT_API_KEY=${DEFAULT_API_KEY:-not-needed}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_REQUEST_LOGGING=${ENABLE_REQUEST_LOGGING:-true}
      - MAX_CONNECTIONS=100
      - REQUEST_TIMEOUT=300
      - TOKEN_SPY_API_PATH=/app/sidecar/api.py
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${TOKEN_SPY_PROXY_PORT:-8080}:8080"
    volumes:
      - token-spy-data:/data
    depends_on:
      token-spy-db:
        condition: service_healthy
      token-spy-redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - token-spy-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # Token Spy Dashboard — Analytics UI
  # ============================================
  token-spy-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: token-spy-dashboard
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://token_spy:${POSTGRES_PASSWORD}@token-spy-db:5432/token_spy
      - DASHBOARD_PORT=3001
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_AUTH_ENABLED=${DASHBOARD_AUTH_ENABLED:-true}
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-admin}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      - ENABLE_SSE=${ENABLE_SSE:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${TOKEN_SPY_DASHBOARD_PORT:-3001}:3001"
    volumes:
      - token-spy-dashboard-cache:/app/cache
    depends_on:
      token-spy-db:
        condition: service_healthy
    networks:
      - token-spy-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ============================================
  # Database — PostgreSQL + TimescaleDB
  # ============================================
  token-spy-db:
    image: timescale/timescaledb:latest-pg15
    container_name: token-spy-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=token_spy
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=token_spy
      - PGDATA=/var/lib/postgresql/data/pgdata
      - TIMESCALEDB_TELEMETRY=off
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${TOKEN_SPY_DB_PORT:-5432}:5432"
    volumes:
      - token-spy-postgres:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d:ro
    networks:
      - token-spy-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U token_spy -d token_spy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ============================================
  # Redis — Rate Limiting & Caching
  # ============================================
  token-spy-redis:
    image: redis:7-alpine
    container_name: token-spy-redis
    restart: unless-stopped
    volumes:
      - token-spy-redis:/data
    networks:
      - token-spy-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ============================================
  # Collector — High-Volume Batch Worker (Optional)
  # ============================================
  # Enable with: docker compose --profile high-volume up -d
  token-spy-collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: token-spy-collector
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://token_spy:${POSTGRES_PASSWORD}@token-spy-db:5432/token_spy
      - REDIS_URL=redis://token-spy-redis:6379/0
      - BATCH_SIZE=${COLLECTOR_BATCH_SIZE:-100}
      - FLUSH_INTERVAL=${COLLECTOR_FLUSH_INTERVAL:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      token-spy-db:
        condition: service_healthy
      token-spy-redis:
        condition: service_healthy
    networks:
      - token-spy-internal
    profiles:
      - high-volume

# ============================================
# Volumes
# ============================================
volumes:
  token-spy-postgres:
  token-spy-data:
  token-spy-dashboard-cache:
  token-spy-redis:

# ============================================
# Networks
# ============================================
networks:
  token-spy-internal:
    driver: bridge
    ipam:
      driver: default
