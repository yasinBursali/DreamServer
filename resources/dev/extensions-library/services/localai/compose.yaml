services:
  localai:
    image: localai/localai:v3.12.1-aio-cpu@sha256:4cbc20c59558ed6c1cae9bc3f6ae34d75d390b370aa8ac62a59327089fa56cec
    container_name: dream-localai
    depends_on:
      llama-server:
        condition: service_healthy
    networks:
      - dream-network
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${LOCALAI_EXTERNAL_PORT:-7803}:8080"
    volumes:
      - ./data/localai/models:/models
      - ./data/localai/builds:/builds
    environment:
      - MODELS_PATH=/models
      - CONFIG_PATH=/builds
      - LLM_API_URL=${LLM_API_URL:-http://llama-server:8080}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    security_opt:
      - no-new-privileges:true

networks:
  dream-network:
    external: true
