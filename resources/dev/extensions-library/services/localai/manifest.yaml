schema_version: dream.services.v1

service:
  id: localai
  name: LocalAI (OpenAI-compatible API)
  aliases: [local-ai, localai]
  container_name: localai
  host_env: LOCALAI_HOST
  default_host: localai
  port: 8080
  external_port_env: LOCALAI_EXTERNAL_PORT
  external_port_default: 7803
  health: /
  type: docker
  gpu_backends: [all]
  category: optional
  depends_on: [llama-server]

features:
  - id: text-generation
    name: Text Generation
    description: Generate text with local LLMs via OpenAI-compatible API
    icon: MessageSquare
    category: ai
    requirements:
      services: [localai]
      vram_gb: 4
    enabled_services_all: [localai]
    setup_time: ~3 minutes
    priority: 5
    gpu_backends: [all]

  - id: image-generation
    name: Image Generation
    description: Generate images with local diffusion models
    icon: Image
    category: media
    requirements:
      services: [localai]
      vram_gb: 8
    enabled_services_all: [localai]
    setup_time: ~5 minutes
    priority: 8
    gpu_backends: [all]

  - id: audio-generation
    name: Audio Generation
    description: Generate audio and clone voices with local models
    icon: Volume2
    category: media
    requirements:
      services: [localai]
      vram_gb: 4
    enabled_services_all: [localai]
    setup_time: ~3 minutes
    priority: 9
    gpu_backends: [all]

  - id: video-generation
    name: Video Generation
    description: Generate video with local models
    icon: Video
    category: media
    requirements:
      services: [localai]
      vram_gb: 16
    enabled_services_all: [localai]
    setup_time: ~5 minutes
    priority: 10
    gpu_backends: [all]

  - id: voice-cloning
    name: Voice Cloning
    description: Clone voices for TTS with local models
    icon: Mic
    category: voice
    requirements:
      services: [localai]
      vram_gb: 4
    enabled_services_all: [localai]
    setup_time: ~3 minutes
    priority: 11
    gpu_backends: [all]
