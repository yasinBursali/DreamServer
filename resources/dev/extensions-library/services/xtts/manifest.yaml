schema_version: dream.services.v1

service:
  id: xtts
  name: XTTS (Coqui TTS)
  aliases: [xtts, coqui, xtts-server]
  container_name: dream-xtts
  host_env: XTTS_HOST
  default_host: xtts
  port: 80
  external_port_env: XTTS_PORT
  external_port_default: 8100
  health: /health
  type: docker
  gpu_backends: [amd, nvidia]
  compose_file: compose.yaml
  category: recommended
  depends_on: []

features:
  - id: voice-cloning-tts
    name: Voice Cloning TTS
    description: High-quality text-to-speech with voice cloning capabilities
    icon: Mic
    category: voice
    requirements:
      services: [xtts]
      vram_gb: 4
    enabled_services_all: [xtts]
    setup_time: ~3 minutes
    priority: 6
    gpu_backends: [amd, nvidia]
