schema_version: dream.services.v1

service:
  id: frigate
  name: Frigate
  aliases: [nvr, camera, security]
  container_name: dream-frigate
  host_env: FRIGATE_HOST
  default_host: frigate
  port: 5000
  external_port_env: FRIGATE_PORT
  external_port_default: 8971
  health: /api/version
  type: docker
  gpu_backends: [nvidia]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars: []
  description: |
    Frigate is an open-source NVR (Network Video Recorder) with realtime
    local object detection for IP cameras. It uses AI to detect people,
    vehicles, and other objects without sending video to the cloud.

features:
  - id: object-detection
    name: Real-Time Object Detection
    description: Real-time AI object detection on camera streams
    icon: Eye
    category: security
    requirements:
      services: [frigate]
      vram_gb: 1
    enabled_services_all: [frigate]
    setup_time: ~3 minutes
    priority: 11
    gpu_backends: [nvidia]

  - id: video-recording
    name: Video Recording
    description: Continuous or event-based video recording with alerts
    icon: Video
    category: security
    requirements:
      services: [frigate]
      vram_gb: 0
    enabled_services_all: [frigate]
    setup_time: ~3 minutes
    priority: 12
    gpu_backends: [nvidia]

tags:
  - nvr
  - camera
  - security
  - object-detection
  - surveillance
  - video
