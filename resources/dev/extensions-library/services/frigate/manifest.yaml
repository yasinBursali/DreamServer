schema_version: dream.services.v1

service:
  id: frigate
  name: Frigate
  aliases: [nvr, camera, security]
  container_name: dream-frigate
  host_env: FRIGATE_HOST
  default_host: frigate
  port: 5000
  external_port_env: FRIGATE_PORT
  external_port_default: 8971
  health: /api/version
  type: docker
  gpu_backends: [nvidia]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars: []
  description: |
    Frigate is an open-source NVR (Network Video Recorder) with realtime
    local object detection for IP cameras. It uses AI to detect people,
    vehicles, and other objects without sending video to the cloud.

features:
  - id: object-detection
    name: Real-Time Object Detection
    description: Real-time AI object detection on camera streams
    icon: Eye
    category: security
    gpu_backends: [nvidia]
    enabled_services_all: [frigate]
    setup_time: ~2 minutes
    requirements:
      services: [frigate]
      vram_gb: 0.5
    priority: 8
  - id: recording
    name: Video Recording
    description: Continuous or event-based video recording
    icon: Video
    category: security
    gpu_backends: [nvidia]
    enabled_services_all: [frigate]
    setup_time: ~2 minutes
    requirements:
      services: [frigate]
      vram_gb: 0
    priority: 9
  - id: notifications
    name: Detection Alerts
    description: Alerts when objects are detected
    icon: Bell
    category: security
    gpu_backends: [nvidia]
    enabled_services_all: [frigate]
    setup_time: ~2 minutes
    requirements:
      services: [frigate]
      vram_gb: 0
    priority: 10
  - id: restreaming
    name: Camera Restreaming
    description: RTSP/WebRTC restreaming of camera feeds
    icon: Cast
    category: security
    gpu_backends: [nvidia]
    enabled_services_all: [frigate]
    setup_time: ~2 minutes
    requirements:
      services: [frigate]
      vram_gb: 0
    priority: 11
