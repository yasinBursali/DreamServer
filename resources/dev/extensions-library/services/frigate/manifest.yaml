schema_version: dream.services.v1

service:
  id: frigate
  name: Frigate
  aliases: [nvr, camera, security]
  container_name: dream-frigate
  host_env: FRIGATE_HOST
  default_host: frigate
  port: 5000
  external_port_env: FRIGATE_PORT
  external_port_default: 8971
  health: /api/version
  type: docker
  gpu_backends: [nvidia]
  compose_file: compose.yaml
  setup_hook: setup.sh
  category: optional
  depends_on: []
  env_vars:
    - key: FRIGATE_RTSP_PASSWORD
      required: true
      secret: true
      description: RTSP password for camera streams
  description: |
    Frigate is an open-source NVR (Network Video Recorder) with realtime
    local object detection for IP cameras. It uses AI to detect people,
    vehicles, and other objects without sending video to the cloud.

  features:
    object-detection:
      description: Real-time AI object detection on camera streams
      vram_required_mb: 512
    recording:
      description: Continuous or event-based video recording
      vram_required_mb: 0
    notifications:
      description: Alerts when objects are detected
      vram_required_mb: 0
    restreaming:
      description: RTSP/WebRTC restreaming of camera feeds
      vram_required_mb: 0

  tags:
    - nvr
    - camera
    - security
    - object-detection
    - surveillance
    - video
