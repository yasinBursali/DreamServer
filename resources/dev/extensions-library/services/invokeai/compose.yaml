services:
  invokeai:
    image: ghcr.io/invoke-ai/invokeai:v6.11.1
    container_name: dream-invokeai
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - INVOKEAI_ROOT=/invokeai
    volumes:
      - ./data/invokeai:/invokeai:rw
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${INVOKEAI_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - dream-network
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          cpus: '1.0'
          memory: 4G

networks:
  dream-network:
    external: true
