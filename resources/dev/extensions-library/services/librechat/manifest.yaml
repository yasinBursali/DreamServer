schema_version: dream.services.v1

service:
  id: librechat
  name: LibreChat
  aliases: [chat, libre]
  container_name: dream-librechat
  host_env: LIBRECHAT_HOST
  default_host: librechat
  port: 3080
  external_port_env: LIBRECHAT_PORT
  external_port_default: 3080
  health: /health
  type: docker
  gpu_backends: [amd, nvidia, apple]
  compose_file: compose.yaml
  category: optional
  depends_on: [librechat-mongodb, librechat-meilisearch]
  description: |
    LibreChat is an enhanced ChatGPT clone with multi-LLM support,
    agents, RAG, and file uploads. Supports OpenAI, Anthropic, Google,
    Azure, Groq, Mistral, OpenRouter, and custom endpoints.

features:
  - id: multi-provider-chat
    name: Multi-Provider AI Chat
    description: Multi-provider AI chat interface with OpenAI, Anthropic, and more
    icon: MessageSquare
    category: chat
    requirements:
      services: [librechat]
      vram_gb: 0
    enabled_services_all: [librechat]
    setup_time: ~2 minutes
    priority: 3

  - id: rag-file-uploads
    name: RAG with File Uploads
    description: Built-in RAG with file uploads and search
    icon: FileUp
    category: ai
    requirements:
      services: [librechat]
      vram_gb: 0
    enabled_services_all: [librechat]
    setup_time: ~2 minutes
    priority: 4

  - id: ai-agents
    name: AI Agents & Plugins
    description: AI agents and plugins support
    icon: Bot
    category: ai
    requirements:
      services: [librechat]
      vram_gb: 0
    enabled_services_all: [librechat]
    setup_time: ~2 minutes
    priority: 5

tags:
  - chat
  - ui
  - multi-provider
  - rag
  - agents
  - openai-compatible
