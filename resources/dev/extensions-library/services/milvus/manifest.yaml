schema_version: dream.services.v1

service:
  id: milvus
  name: Milvus (Vector Database)
  aliases: [vector-db, milvus-db]
  container_name: dream-milvus
  host_env: MILVUS_HOST
  default_host: milvus
  port: 19530
  external_port_env: MILVUS_PORT
  external_port_default: 19530
  health: /healthz
  type: docker
  gpu_backends: [none]
  compose_file: compose.yaml
  category: recommended
  depends_on: []

features:
  - id: vector-database
    name: Vector Database
    description: Cloud-native vector database for AI embeddings and similarity search
    icon: Database
    category: data
    requirements:
      services: [milvus]
      vram_gb: 0
    enabled_services_all: [milvus]
    setup_time: ~2 minutes
    priority: 9
