schema_version: dream.services.v1

service:
  id: jan
  name: Jan
  aliases: [jan-ai, local-llm]
  container_name: dream-jan
  host_env: JAN_HOST
  default_host: jan
  port: 1337
  external_port_env: JAN_PORT
  external_port_default: 1337
  health: /health
  type: docker
  gpu_backends: [amd, nvidia]
  compose_file: compose.yaml.disabled
  enabled: false
  category: optional
  depends_on: []
  env_vars: []
  description: |
    Jan is a ChatGPT alternative that runs 100% offline on your computer.
    Multi-engine support (llama.cpp, TensorRT-LLM). Local-first, privacy-focused.

features:
  - id: local-llm-chat
    name: Local LLM Chat
    description: Chat with local language models offline
    icon: MessageSquare
    category: ai
    requirements:
      services: [jan]
      vram_gb: 0
    enabled_services_all: [jan]
    setup_time: ~2 minutes
    priority: 12
    gpu_backends: [amd, nvidia]

tags:
  - llm
  - chat
  - local
  - privacy
  - offline
