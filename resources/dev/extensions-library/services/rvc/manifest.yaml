schema_version: dream.services.v1

service:
  id: rvc
  name: RVC
  aliases: [voice-conversion, voice-clone]
  container_name: dream-rvc
  host_env: RVC_HOST
  default_host: rvc
  port: 7865
  external_port_env: RVC_PORT
  external_port_default: 7809
  health: /
  type: docker
  gpu_backends: [amd, nvidia]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars:
    - key: RVC_API_KEY
      description: API key for RVC service authentication (optional; leave empty to disable auth)
      default: ""

features:
  - id: voice-cloning
    name: Voice Cloning
    description: Retrieval-based voice conversion and cloning
    icon: Mic
    category: voice
    requirements:
      services: [rvc]
      vram_gb: 6
    enabled_services_all: [rvc]
    setup_time: ~2 minutes
    priority: 12
    gpu_backends: [amd, nvidia]
