schema_version: dream.services.v1

service:
  id: anythingllm
  name: AnythingLLM
  aliases: [anything, allm]
  container_name: dream-anythingllm
  host_env: ANYTHINGLLM_HOST
  default_host: anythingllm
  port: 3001
  external_port_env: ANYTHINGLLM_PORT
  external_port_default: 7800
  health: /api/health
  type: docker
  gpu_backends: [nvidia, amd]
  compose_file: compose.yaml
  category: optional
  depends_on: [ollama]
  description: |
    All-in-one AI productivity tool for RAG chat with documents.
    Built-in vector database, supports multiple LLM providers,
    and runs entirely on-device for privacy.

features:
  - id: rag
    name: RAG Document Chat
    description: RAG chat with uploaded documents
    icon: FileSearch
    category: ai
    gpu_backends: [nvidia, amd]
    enabled_services_all: [anythingllm]
    setup_time: ~2 minutes
    requirements:
      services: [anythingllm]
      vram_gb: 0
    priority: 6
  - id: chat
    name: Multi-Provider Chat
    description: Chat interface with multiple LLM providers
    icon: MessageSquare
    category: chat
    gpu_backends: [nvidia, amd]
    enabled_services_all: [anythingllm]
    setup_time: ~2 minutes
    requirements:
      services: [anythingllm]
      vram_gb: 0
    priority: 7
  - id: embed
    name: Built-in Embeddings
    description: Built-in embedding and vector search
    icon: Database
    category: data
    gpu_backends: [nvidia, amd]
    enabled_services_all: [anythingllm]
    setup_time: ~2 minutes
    requirements:
      services: [anythingllm]
      vram_gb: 0
    priority: 8
  - id: agents
    name: AI Workflow Agents
    description: AI agents for automated workflows
    icon: Bot
    category: ai
    gpu_backends: [nvidia, amd]
    enabled_services_all: [anythingllm]
    setup_time: ~2 minutes
    requirements:
      services: [anythingllm]
      vram_gb: 2
    priority: 9
