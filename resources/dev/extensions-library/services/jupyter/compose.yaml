services:
  jupyter:
    image: jupyter/scipy-notebook:python-3.11
    container_name: dream-jupyter
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${JUPYTER_PORT:-8889}:8888"
    volumes:
      - ./data/jupyter/workspace:/home/jovyan/work
      - ./data/jupyter/notebooks:/home/jovyan/notebooks
    environment:
      - LLM_API_URL=${LLM_API_URL:-http://localhost:8000}
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:?JUPYTER_TOKEN must be set}
      - NB_PREFIX=/
    command:
      - start.sh
      - jupyter
      - lab
      - --NotebookApp.token=${JUPYTER_TOKEN:?JUPYTER_TOKEN must be set}
      - --NotebookApp.password=
      - --NotebookApp.port=8888
      - --NotebookApp.ip=0.0.0.0
      - --NotebookApp.open_browser=False
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8888/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dream-network

# Named volumes removed — using bind mounts only

networks:
  dream-network:
    external: true
    name: dream-network
