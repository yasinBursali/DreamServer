schema_version: dream.services.v1

service:
  id: ollama
  name: Ollama
  aliases: [ollama-api, ollama-backend]
  container_name: dream-ollama
  host_env: OLLAMA_HOST
  default_host: ollama
  port: 11434
  external_port_env: OLLAMA_PORT
  external_port_default: 7804
  health: /api/tags
  type: docker
  gpu_backends: [amd, nvidia]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars:
    - key: OLLAMA_MODEL
      required: false
      description: Default model to load on startup

features:
  - id: ollama-llm
    name: Ollama LLM Backend
    description: Alternative LLM backend for running open-source models
    icon: Cpu
    category: ai
    requirements:
      services: [ollama]
      vram_gb: 8
    enabled_services_all: [ollama]
    setup_time: ~2 minutes
    priority: 5
    gpu_backends: [amd, nvidia]
