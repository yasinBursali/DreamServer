services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.2
    container_name: dream-weaviate
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=false
      - AUTHENTICATION_APIKEY_ENABLED=true
      - AUTHENTICATION_APIKEY_ALLOWED_KEYS=${WEAVIATE_API_KEY:?WEAVIATE_API_KEY must be set}
      - AUTHENTICATION_APIKEY_USERS=admin@dreamserver.local
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - CLUSTER_HOSTNAME=dream-weaviate
      - RAFT_JOIN=dream-weaviate
      - RAFT_BOOTSTRAP_EXPECT=1
    volumes:
      - ./data/weaviate:/var/lib/weaviate
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${WEAVIATE_PORT:-7811}:8080"
      - "${BIND_ADDRESS:-127.0.0.1}:${WEAVIATE_GRPC_PORT:-50051}:50051"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dream-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

networks:
  dream-network:
    external: true
