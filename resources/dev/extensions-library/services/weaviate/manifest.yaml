schema_version: dream.services.v1

service:
  id: weaviate
  name: Weaviate
  aliases: [vector-db, weaviate-db]
  container_name: dream-weaviate
  host_env: WEAVIATE_HOST
  default_host: weaviate
  port: 8080
  external_port_env: WEAVIATE_PORT
  external_port_default: 7811
  health: /v1/.well-known/ready
  type: docker
  gpu_backends: [none]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars:
    - key: WEAVIATE_API_KEY
      required: true
      secret: true
      description: "API key for Weaviate authentication (auto-generated by setup.sh)"
  setup_hook: setup.sh
  description: |
    Weaviate is an open-source vector database that stores both objects and vectors.
    Supports semantic search, hybrid search, structured filtering, and multi-tenancy.
    A cloud-native alternative to ChromaDB with gRPC support and horizontal scaling.

  features:
    vector-search:
      description: Semantic similarity search with vector embeddings
      vram_required_mb: 0
    hybrid-search:
      description: Combine vector similarity with keyword matching
      vram_required_mb: 0
    multi-tenancy:
      description: Isolated data spaces for different users/organizations
      vram_required_mb: 0

  tags:
    - vector-database
    - semantic-search
    - embeddings
    - open-source
    - scalable
    - local
