services:
  immich:
    image: ghcr.io/immich-app/immich-server:v1.131.3
    container_name: dream-immich
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${IMMICH_PORT:-2283}:2283"
    volumes:
      - ./data/immich/upload:/usr/src/app/upload
      - ./data/immich/backup:/usr/src/app/backup
    environment:
      - LLM_API_URL=${LLM_API_URL:-http://localhost:8000}
      - DB_HOSTNAME=${IMMICH_DB_HOST:-immich-postgres}
      - DB_USERNAME=${IMMICH_DB_USER:-postgres}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD:-postgres}
      - DB_DATABASE_NAME=${IMMICH_DB_NAME:-immich}
      - REDIS_HOSTNAME=${IMMICH_REDIS_HOST:-immich-redis}
      - REDIS_PORT=${IMMICH_REDIS_PORT:-6379}
    depends_on:
      immich-postgres:
        condition: service_healthy
      immich-redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:2283/api/server/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - dream-network

  immich-postgres:
    image: docker.io/tensorchord/pgvecto-rs:pg16-v0.2.0
    container_name: immich-postgres
    volumes:
      - ./data/immich/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD:-postgres}
      - POSTGRES_DB=immich
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dream-network

  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    volumes:
      - ./data/immich/redis:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dream-network

networks:
  dream-network:
    external: true
