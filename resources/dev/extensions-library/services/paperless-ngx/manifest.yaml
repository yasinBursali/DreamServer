schema_version: dream.services.v1

service:
  id: paperless-ngx
  name: Paperless-ngx
  aliases: [paperless, document-manager]
  container_name: dream-paperless
  host_env: PAPERLESS_HOST
  default_host: paperless
  port: 8000
  external_port_env: PAPERLESS_PORT
  external_port_default: 7807
  health: /accounts/login/
  type: docker
  gpu_backends: [none]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars: []
  description: |
    Paperless-ngx is a document management system that transforms your physical
    documents into a searchable online archive. OCR, tagging, automatic
    classification, and full-text search for PDFs and images.

features:
  - id: document-management
    name: Document Management
    description: Searchable document archive with OCR, tagging, and full-text search
    icon: FileText
    category: productivity
    requirements:
      services: [paperless-ngx]
      vram_gb: 0
    enabled_services_all: [paperless-ngx]
    setup_time: ~2 minutes
    priority: 14

  - id: auto-classification
    name: Auto Classification
    description: Automatic document tagging and classification with email import
    icon: Tag
    category: productivity
    requirements:
      services: [paperless-ngx]
      vram_gb: 0
    enabled_services_all: [paperless-ngx]
    setup_time: ~2 minutes
    priority: 15

tags:
  - documents
  - ocr
  - archive
  - pdf
  - search
  - productivity
