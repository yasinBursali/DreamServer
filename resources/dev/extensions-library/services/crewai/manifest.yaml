schema_version: dream.services.v1

service:
  id: crewai
  name: CrewAI
  aliases: [crew, crew-ai, multi-agent]
  container_name: dream-crewai
  host_env: CREWAI_HOST
  default_host: crewai
  port: 8501
  external_port_env: CREWAI_PORT
  external_port_default: 8501
  health: /
  type: docker
  gpu_backends: [none]
  category: optional
  depends_on: []
  env_vars: []
  compose_file: compose.yaml
  description: |
    CrewAI is a multi-agent framework for AI workflows. It enables autonomous
    AI agents to collaborate, delegate tasks, and work together to solve
    complex problems. Perfect for building agent teams that simulate real-world
    collaboration and decision-making.

features:
  - id: multi-agent-orchestration
    name: Multi-Agent Orchestration
    description: Teams of autonomous AI agents working together with task delegation
    icon: Bot
    category: ai
    requirements:
      services: [crewai]
      vram_gb: 0
    enabled_services_all: [crewai]
    setup_time: ~2 minutes
    priority: 7

  - id: workflow-processes
    name: Workflow Processes
    description: Sequential and hierarchical task execution with manager-led coordination
    icon: GitBranch
    category: ai
    requirements:
      services: [crewai]
      vram_gb: 0
    enabled_services_all: [crewai]
    setup_time: ~2 minutes
    priority: 8

tags:
  - multi-agent
  - orchestration
  - automation
  - autonomous-agents
  - workflow
  - python
