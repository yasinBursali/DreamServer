schema_version: dream.services.v1

service:
  id: flowise
  name: Flowise
  aliases: [flow, workflow]
  container_name: dream-flowise
  host_env: FLOWISE_HOST
  default_host: flowise
  port: 3000
  external_port_env: FLOWISE_PORT
  external_port_default: 7801
  health: /api/v1/health
  type: docker
  gpu_backends: [amd, nvidia, apple]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  description: |
    Visual LLM workflow builder with drag-and-drop interface.
    Build AI agents, chatbots, and automation flows without code.
    Integrates with OpenAI, Anthropic, local models, and 100+ tools.

features:
  - id: visual-workflow
    name: Visual Workflow Builder
    description: Visual drag-and-drop workflow builder for AI agents and chatbots
    icon: Workflow
    category: ai
    requirements:
      services: [flowise]
      vram_gb: 0
    enabled_services_all: [flowise]
    setup_time: ~2 minutes
    priority: 6

  - id: tool-integrations
    name: Tool Integrations
    description: 100+ integrations with databases, APIs, and LLM providers
    icon: Plug
    category: ai
    requirements:
      services: [flowise]
      vram_gb: 0
    enabled_services_all: [flowise]
    setup_time: ~2 minutes
    priority: 7

tags:
  - workflow
  - visual
  - nocode
  - agents
  - automation
  - lowcode
