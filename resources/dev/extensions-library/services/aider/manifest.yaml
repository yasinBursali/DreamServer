schema_version: dream.services.v1

service:
  id: aider
  name: Aider
  aliases: [aider-chat, pair-programming]
  container_name: dream-aider
  host_env: AIDER_HOST
  default_host: aider
  port: 0
  external_port_env: ''
  external_port_default: 0
  type: docker
  startup_check: false  # one-shot CLI tool — container exits 0 by design
  gpu_backends: [amd, nvidia, apple]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  description: "AI pair programming tool that lets you edit code in your terminal using GPT-4 and Claude."
  env_vars:
    - key: OPENAI_API_KEY
      required: false
      secret: true
      default: ""
      description: OpenAI API key (leave empty to use local LLM)
    - key: ANTHROPIC_API_KEY
      required: false
      secret: true
      default: ""
      description: Anthropic API key (leave empty to use local LLM)

features:
  - id: ai-pair-programming
    name: AI Pair Programming
    description: AI pair programming in your terminal
    icon: Terminal
    category: development
    requirements:
      services: [aider]
      vram_gb: 0
    enabled_services_all: [aider]
    setup_time: ~1 minute
    priority: 11
