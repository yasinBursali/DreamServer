schema_version: dream.services.v1

service:
  id: aider
  name: Aider
  aliases: [aider-chat, pair-programming]
  container_name: aider
  host_env: AIDER_HOST
  default_host: aider
  port: 0
  external_port_env: ''
  external_port_default: 0
  health: ""
  type: docker
  gpu_backends: [none]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars:
    - key: OPENAI_API_KEY
      required: false
      secret: true
      description: OpenAI API key
    - key: ANTHROPIC_API_KEY
      required: false
      secret: true
      description: Anthropic API key

features:
  - id: ai-pair-programming
    name: AI Pair Programming
    description: AI pair programming in your terminal
    icon: Terminal
    category: development
    requirements:
      services: [aider]
      vram_gb: 0
    enabled_services_all: [aider]
    setup_time: ~1 minute
    priority: 11
    gpu_backends: [all]
