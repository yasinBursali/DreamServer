schema_version: dream.services.v1

service:
  id: label-studio
  name: Label Studio
  aliases: [data-labeling, annotation]
  container_name: dream-label-studio
  host_env: LABEL_STUDIO_HOST
  default_host: label-studio
  port: 8080
  external_port_env: LABEL_STUDIO_PORT
  external_port_default: 8085
  health: /health
  type: docker
  gpu_backends: [none]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars: []
  description: |
    Label Studio is an open source data labeling tool.
    Label images, audio, text, time series, and more for ML model training.

features:
  - id: data-labeling
    name: Data Labeling
    description: Label data for machine learning models
    icon: Tag
    category: ml
    requirements:
      services: [label-studio]
      vram_gb: 0
    enabled_services_all: [label-studio]
    setup_time: ~1 minute
    priority: 15
    gpu_backends: [all]

tags:
  - labeling
  - annotation
  - ml
  - data
  - training
