services:
  langflow:
    image: langflowai/langflow:1.8.0
    container_name: dream-langflow
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - LANGFLOW_HOST=0.0.0.0
      - LANGFLOW_PORT=7860
      - LLM_API_URL=${LLM_API_URL:-http://llama-server:8080}
    volumes:
      - ./data/langflow:/app/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${LANGFLOW_PORT:-7802}:7860"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dream-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

networks:
  dream-network:
    external: true
