schema_version: dream.services.v1

service:
  id: forge
  name: Forge / A1111
  aliases: [forge-ui, a1111, stable-diffusion-webui]
  container_name: dream-forge
  host_env: FORGE_HOST
  default_host: forge
  port: 7861
  external_port_env: FORGE_PORT
  external_port_default: 7861
  health: /
  type: docker
  gpu_backends: [nvidia]
  category: optional
  depends_on: []
  description: |
    Forge (based on Automatic1111) is the original Stable Diffusion web UI.
    Features extensive model support, extensions, inpainting, outpainting,
    and professional-grade image generation capabilities. GPU required.

features:
  - id: image-generation
    name: Image Generation
    description: Full Stable Diffusion control with advanced settings
    icon: Image
    category: media
    requirements:
      services: [forge]
      vram_gb: 8
    enabled_services_all: [forge]
    setup_time: ~5 minutes
    priority: 8
    gpu_backends: [nvidia]

  - id: inpainting
    name: Inpainting & Outpainting
    description: Inpainting with mask support and outpainting beyond image boundaries
    icon: Paintbrush
    category: media
    requirements:
      services: [forge]
      vram_gb: 8
    enabled_services_all: [forge]
    setup_time: ~5 minutes
    priority: 9
    gpu_backends: [nvidia]

  - id: upscaling
    name: Image Upscaling
    description: High-resolution upscaling with multiple engines
    icon: Maximize
    category: media
    requirements:
      services: [forge]
      vram_gb: 4
    enabled_services_all: [forge]
    setup_time: ~5 minutes
    priority: 10
    gpu_backends: [nvidia]

tags:
  - image
  - stable-diffusion
  - webui
  - generative
  - professional
