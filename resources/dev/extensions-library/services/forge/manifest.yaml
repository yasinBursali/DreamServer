schema_version: dream.services.v1

service:
  id: forge
  name: Forge / A1111
  aliases: [forge-ui, a1111, stable-diffusion-webui]
  container_name: dream-forge
  host_env: FORGE_HOST
  default_host: forge
  port: 7861
  external_port_env: FORGE_PORT
  external_port_default: 7861
  health: /
  type: docker
  gpu_backends: [nvidia]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  description: |
    Forge (based on Automatic1111) is the original Stable Diffusion web UI.
    Features extensive model support, extensions, inpainting, outpainting,
    and professional-grade image generation capabilities. GPU required.

features:
  - id: image-generation
    name: Stable Diffusion Generation
    description: Full Stable Diffusion control with advanced settings
    icon: Image
    category: creative
    gpu_backends: [nvidia]
    enabled_services_all: [forge]
    setup_time: ~2 minutes
    requirements:
      services: [forge]
      vram_gb: 8
    priority: 5
  - id: inpainting
    name: Image Inpainting
    description: Inpainting with mask support
    icon: Paintbrush
    category: creative
    gpu_backends: [nvidia]
    enabled_services_all: [forge]
    setup_time: ~2 minutes
    requirements:
      services: [forge]
      vram_gb: 8
    priority: 6
  - id: outpainting
    name: Image Outpainting
    description: Outpainting beyond image boundaries
    icon: Maximize
    category: creative
    gpu_backends: [nvidia]
    enabled_services_all: [forge]
    setup_time: ~2 minutes
    requirements:
      services: [forge]
      vram_gb: 8
    priority: 7
  - id: upscaling
    name: Image Upscaling
    description: High-resolution upscaling with multiple engines
    icon: ZoomIn
    category: creative
    gpu_backends: [nvidia]
    enabled_services_all: [forge]
    setup_time: ~2 minutes
    requirements:
      services: [forge]
      vram_gb: 4
    priority: 8
