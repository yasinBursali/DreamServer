services:
  text-generation-webui:
    # atinoda/text-generation-webui is the most widely-used community image.
    # Supports nvidia, amd, and cpu variants. Pinned to v4.0 nvidia release.
    image: atinoda/text-generation-webui:default-nvidia-v4.0@sha256:155069f7ed8d4f3354dc7540352064cc354826a2e231d2e673dde63b76c7fac2
    container_name: dream-text-generation-webui
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${TEXT_GEN_WEBUI_PORT:-7862}:7860"
      - "${BIND_ADDRESS:-127.0.0.1}:${TEXT_GEN_WEBUI_API_PORT:-5001}:5001"  # OpenAI-compatible API
    environment:
      - EXTRA_LAUNCH_ARGS=--api --listen --listen-port 7860 --api-port ${TEXT_GEN_WEBUI_API_PORT:-5001} --extensions openai
    volumes:
      - ./data/text-generation-webui/models:/app/text-generation-webui/models
      - ./data/text-generation-webui/characters:/app/text-generation-webui/characters
      - ./data/text-generation-webui/presets:/app/text-generation-webui/presets
      - ./data/text-generation-webui/loras:/app/text-generation-webui/loras
      - ./data/text-generation-webui/logs:/app/text-generation-webui/logs
      - ./data/text-generation-webui/extensions:/app/text-generation-webui/extensions
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/')"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - dream-network
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 32G
        reservations:
          cpus: '1.0'
          memory: 4G

networks:
  dream-network:
    external: true
