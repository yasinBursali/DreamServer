schema_version: dream.services.v1

service:
  id: dify
  name: Dify
  aliases: [llm-app, workflow, agent]
  container_name: dream-dify
  host_env: DIFY_HOST
  default_host: dify
  port: 5001
  external_port_env: DIFY_PORT
  external_port_default: 8002
  health: /health
  type: docker
  gpu_backends: [amd, nvidia]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars:
    - key: DIFY_SECRET_KEY
      required: true
      secret: true
      description: "Dify secret key for API access (generate with: openssl rand -hex 32)"
    - key: DIFY_EXTERNAL_URL
      required: false
      secret: false
      description: "External URL for Dify - used in API responses and redirects (default: http://localhost:8002)"
    - key: DIFY_OPENAI_API_BASE
      required: false
      secret: false
      description: "OpenAI-compatible API endpoint for LLM backend (default: http://llama-server:8080/v1)"
    - key: DIFY_OPENAI_API_KEY
      required: false
      secret: true
      description: "API key for OpenAI-compatible endpoint (default: dummy-key)"
    - key: DIFY_INIT_PASSWORD
      required: false
      secret: false
      description: Initial admin password (optional, set in .env)

features:
  - id: agent-platform
    name: AI Agent Platform
    description: Build and deploy AI agents and workflows
    icon: Bot
    category: ai
    requirements:
      services: [dify]
      vram_gb: 4
    enabled_services_all: [dify]
    setup_time: ~2 minutes
    priority: 7
    gpu_backends: [amd, nvidia]
