services:
  sillytavern:
    image: ghcr.io/sillytavern/sillytavern@sha256:6d645d1ea23c2bafbe2186449f61f6a16a4485df50fd6b22b3deb7e77888610f
    container_name: dream-sillytavern
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - LLM_API_URL=${LLM_API_URL:-http://llama-server:8080/v1}
    volumes:
      - ./config/sillytavern:/home/node/app/config:rw
      - ./data/sillytavern:/home/node/app/data:rw
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${SILLYTAVERN_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dream-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.2'
          memory: 512M

networks:
  dream-network:
    external: true
