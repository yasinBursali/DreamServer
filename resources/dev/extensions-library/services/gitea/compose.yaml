services:
  gitea:
    image: gitea/gitea:1.23.5-rootless@sha256:3a335645ca700660ac6c10d6f3223b6611ed6959441f6d2f7cd5fa607baf1425
    container_name: dream-gitea
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - GITEA_APP_NAME=${GITEA_APP_NAME:-Dream Server Git}
      - GITEA_RUN_MODE=prod
      - GITEA_WORK_DIR=/var/lib/gitea
      - GITEA_CUSTOM=/var/lib/gitea/custom
      - GITEA_TEMP=/tmp/gitea
      - GITEA__LOG__MODE=console
      - GITEA__DATABASE__DB_TYPE=sqlite3
      - GITEA__DATABASE__PATH=/var/lib/gitea/gitea.db
      - GITEA__REPOSITORY__ROOT=/var/lib/gitea/git/repositories
      - GITEA__SERVER__DOMAIN=${GITEA_HOST:-localhost}
      - GITEA__SERVER__ROOT_URL=http://${GITEA_HOST:-localhost}:${GITEA_PORT:-7830}/
      - GITEA__SERVER__HTTP_PORT=3000
      - GITEA__SERVER__SSH_PORT=${GITEA_SSH_PORT:-2222}
      - GITEA__SECURITY__INSTALL_LOCK=true
      - GITEA__SERVICE__DISABLE_REGISTRATION=true
      - GITEA__SERVICE__REQUIRE_SIGNIN_VIEW=true
    volumes:
      - ./data/gitea:/var/lib/gitea:rw
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${GITEA_PORT:-7830}:3000"
      - "${BIND_ADDRESS:-127.0.0.1}:${GITEA_SSH_PORT:-2222}:2222"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dream-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  dream-network:
    external: true
