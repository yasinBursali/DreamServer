schema_version: dream.services.v1

service:
  id: baserow
  name: Baserow
  aliases: [database, airtable, nocodb]
  container_name: dream-baserow
  host_env: BASEROW_HOST
  default_host: baserow
  port: 80
  external_port_env: BASEROW_PORT
  external_port_default: 3006
  health: /api/_health/
  type: docker
  gpu_backends: [none]
  category: optional
  depends_on: []
  description: |
    Open-source no-code database tool and Airtable alternative.
    Create databases, tables, and views with a spreadsheet-like interface.
    Self-hosted with no storage restrictions. MIT licensed.

features:
  - id: nocode-database
    name: No-Code Database
    description: No-code database with spreadsheet interface, views, and REST API
    icon: Table
    category: productivity
    requirements:
      services: [baserow]
      vram_gb: 0
    enabled_services_all: [baserow]
    setup_time: ~2 minutes
    priority: 13

  - id: realtime-collaboration
    name: Real-Time Collaboration
    description: Real-time collaboration and permissions for team databases
    icon: Users
    category: productivity
    requirements:
      services: [baserow]
      vram_gb: 0
    enabled_services_all: [baserow]
    setup_time: ~2 minutes
    priority: 14

tags:
  - database
  - nocode
  - airtable
  - spreadsheet
  - collaboration
  - productivity
