services:
  baserow:
    image: baserow/baserow:2.1.4
    container_name: dream-baserow
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - BASEROW_PUBLIC_URL=${BASEROW_PUBLIC_URL:-http://localhost:3007}
      - BASEROW_CADDY_ADDRESSES=${BASEROW_CADDY_ADDRESSES:-:80}
      - BASEROW_BACKEND_LOG_LEVEL=${BASEROW_LOG_LEVEL:-INFO}
      - BASEROW_FRONTEND_LOG_LEVEL=${BASEROW_LOG_LEVEL:-INFO}
      - BASEROW_BACKEND_DEBUG=${BASEROW_DEBUG:-false}
      - BASEROW_FRONTEND_DEBUG=${BASEROW_DEBUG:-false}
      - DATABASE_USER=${BASEROW_DATABASE_USER:-baserow}
      - DATABASE_NAME=${BASEROW_DATABASE_NAME:-baserow}
      - DATABASE_PASSWORD=${BASEROW_DATABASE_PASSWORD:-}
      - DATABASE_HOST=${BASEROW_DATABASE_HOST:-}
      - DATABASE_PORT=${BASEROW_DATABASE_PORT:-5432}
      - REDIS_HOST=${BASEROW_REDIS_HOST:-}
      - REDIS_PORT=${BASEROW_REDIS_PORT:-6379}
      - REDIS_PROTOCOL=${BASEROW_REDIS_PROTOCOL:-redis}
      - REDIS_USER=${BASEROW_REDIS_USER:-}
      - REDIS_PASSWORD=${BASEROW_REDIS_PASSWORD:-}
      - BASEROW_EXTRA_ALLOWED_HOSTS=${BASEROW_EXTRA_ALLOWED_HOSTS:-}
      - BASEROW_DISABLE_DEFAULT_PUBLIC_URL_CHECK=${BASEROW_DISABLE_DEFAULT_PUBLIC_URL_CHECK:-true}
      - BASEROW_ENABLE_SECURE_PROXY_SSL_HEADER=${BASEROW_ENABLE_SECURE_PROXY_SSL_HEADER:-false}
      - BASEROW_AMOUNT_OF_WORKERS=${BASEROW_WORKERS:-1}
      - BASEROW_BACKEND_WORKERS=${BASEROW_BACKEND_WORKERS:-1}
      - BASEROW_FRONTEND_WORKERS=${BASEROW_FRONTEND_WORKERS:-1}
      - BASEROW_BASEROW_WAIT_BEFORE_SETUP=${BASEROW_WAIT_BEFORE_SETUP:-10}
      - BASEROW_TRIGGER_SYNC_TEMPLATES_AFTER_MIGRATION=${BASEROW_TRIGGER_SYNC_TEMPLATES:-true}
      - BASEROW_SYNC_TEMPLATES_ON_STARTUP=${BASEROW_SYNC_TEMPLATES_ON_STARTUP:-true}
      - BASEROW_BUILD_SEARCH_INDEX_ON_STARTUP=${BASEROW_BUILD_SEARCH_INDEX_ON_STARTUP:-true}
    volumes:
      - ./data/baserow:/baserow/data:rw
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${BASEROW_PORT:-3007}:80"
    networks:
      - dream-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "-H", "Host: localhost:3007", "http://127.0.0.1:80/api/_health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

networks:
  dream-network:
    external: true
