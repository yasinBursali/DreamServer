# Dream Server — AMD GPU Overlay (Core Services Only)
# ComfyUI GPU config moved to extensions/services/comfyui/compose.amd.yaml
# Use with: docker compose -f docker-compose.base.yml -f docker-compose.amd.yml up -d

services:
  llama-server:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2
    entrypoint: ["llama-server"]
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-992}"
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.1
      - ROCBLAS_USE_HIPBLASLT=0
    deploy:
      resources:
        limits:
          cpus: '16.0'
          memory: 110G
        reservations:
          cpus: '4.0'
          memory: 8G

  dashboard-api:
    environment:
      # Hard-code AMD backend so the dashboard uses amd sysfs GPU detection
      # regardless of .env state (e.g. if the installer ran without sudo
      # and couldn't write GPU_BACKEND=amd to .env).
      - GPU_BACKEND=amd
    volumes:
      - /sys/class/drm:/sys/class/drm:ro
      - /sys/class/hwmon:/sys/class/hwmon:ro
