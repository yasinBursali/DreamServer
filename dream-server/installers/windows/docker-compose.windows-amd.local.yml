# Dream Server -- Windows AMD local-LLM readiness sidecar
# Loaded only when local inference (Lemonade or llama-server.exe) is enabled.
# Probes both /api/v1/health (Lemonade) and /health (llama-server.exe) so the
# same overlay works for both backends without env-var configuration.
#
# Use with: docker compose -f docker-compose.base.yml \
#                          -f installers/windows/docker-compose.windows-amd.yml \
#                          -f installers/windows/docker-compose.windows-amd.local.yml up -d

services:
  llama-server-ready:
    image: busybox:1.36.1
    container_name: dream-llama-ready
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint:
      - sh
      - -c
      - |
        echo "Waiting for native inference server on host..."
        while ! { wget -qO- "http://host.docker.internal:${OLLAMA_PORT:-8080}/api/v1/health" >/dev/null 2>&1 \
              || wget -qO- "http://host.docker.internal:${OLLAMA_PORT:-8080}/health"        >/dev/null 2>&1; }; do
          sleep 2
        done
        echo "Inference server is ready"
        sleep infinity
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'wget -qO- "http://host.docker.internal:${OLLAMA_PORT:-8080}/api/v1/health" >/dev/null 2>&1 || wget -qO- "http://host.docker.internal:${OLLAMA_PORT:-8080}/health" >/dev/null 2>&1 || exit 1'
      interval: 10s
      timeout: 5s
      retries: 90
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M
    security_opt:
      - no-new-privileges:true

  open-webui:
    depends_on:
      llama-server-ready:
        condition: service_healthy
