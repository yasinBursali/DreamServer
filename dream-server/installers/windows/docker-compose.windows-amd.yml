# Dream Server — Windows AMD Strix Halo Overlay
# llama-server runs natively on Windows host (Vulkan backend)
# All other services remain in Docker, reaching the host via host.docker.internal
#
# Use with: docker compose -f docker-compose.base.yml -f installers/windows/docker-compose.windows-amd.yml up -d

services:
  llama-server:
    deploy:
      replicas: 0    # Disabled — running natively on Windows host via Vulkan

  dashboard-api:
    environment:
      - OLLAMA_URL=http://host.docker.internal:8080

  open-webui:
    environment:
      OPENAI_API_BASE_URL: "http://host.docker.internal:8080/v1"
