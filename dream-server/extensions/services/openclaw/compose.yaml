services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.3.8
    container_name: dream-openclaw
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - OPENCLAW_CONFIG=/config/openclaw.json
      - OPENCLAW_DATA=/data
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_TOKEN:?Set OPENCLAW_TOKEN in .env}
      - LLM_MODEL=${LLM_MODEL:-qwen3:30b-a3b}
      - BOOTSTRAP_MODEL=${BOOTSTRAP_MODEL:-qwen3:8b-q4_K_M}
      - GGUF_FILE=${GGUF_FILE:-}
      - OLLAMA_URL=${LLM_API_URL:-http://llama-server:8080}
      - OPENCLAW_LLM_URL=${OPENCLAW_LLM_URL:-}
      - OPENCLAW_HTTP_API=${OPENCLAW_HTTP_API:-}
      - LITELLM_KEY=${LITELLM_KEY:-}
      - SEARXNG_BASE_URL=http://searxng:8080
      - OPENCLAW_EXTERNAL_PORT=${OPENCLAW_PORT:-7860}
      - HOME=/home/node
    user: "0:0"
    entrypoint: ["/bin/sh", "-c", "chown -R 1000:1000 /home/node/.openclaw; exec setpriv --reuid=1000 --regid=1000 --clear-groups /bin/sh -c 'node /config/inject-token.js; export OPENCLAW_CONFIG_PATH=/tmp/openclaw-config.json; exec docker-entrypoint.sh node openclaw.mjs gateway --allow-unconfigured --bind lan'"]
    volumes:
      - ./config/openclaw:/config:ro
      - ./data/openclaw:/data
      - ./config/openclaw/workspace:/home/node/.openclaw/workspace
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${OPENCLAW_PORT:-7860}:18789"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    depends_on:
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$$OPENCLAW_HTTP_API\" = 'true' ]; then wget -qO- http://127.0.0.1:18790/v1/models || exit 1; else wget -qO- http://127.0.0.1:18789/ || exit 1; fi"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # When OpenClaw is enabled, register it as a second model backend in Open WebUI.
  # Port 18790 is the OpenAI-compat shim (serves /v1/models + proxies /v1/chat/completions).
  open-webui:
    environment:
      - OPENAI_API_BASE_URLS=${LLM_API_URL:-http://llama-server:8080}/v1;http://openclaw:18790/v1
      - OPENAI_API_KEYS=;${OPENCLAW_TOKEN:-}
