schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: llama-server
  name: llama-server (LLM Inference)
  aliases: [llm]
  container_name: dream-llama-server
  host_env: OLLAMA_HOST
  default_host: llama-server
  port: 8080
  external_port_env: OLLAMA_PORT
  external_port_default: 8080
  health: /health
  health_timeout: 15
  type: docker
  gpu_backends: [amd, nvidia]
  category: core
  depends_on: []

features:
  - id: chat
    name: AI Chat
    description: Chat with your local AI model
    icon: MessageSquare
    category: core
    requirements:
      services_any: [llama-server]
      vram_gb: 4
    enabled_services_any: [llama-server]
    setup_time: Ready
    priority: 1
    gpu_backends: [amd, nvidia]

  - id: documents
    name: Document Q&A
    description: Upload documents and ask questions
    icon: FileText
    category: productivity
    requirements:
      services: [qdrant]
      services_any: [llama-server]
      vram_gb: 4
      disk_gb: 1
    enabled_services_all: [qdrant]
    setup_time: ~2 minutes
    priority: 3
    gpu_backends: [amd, nvidia]
