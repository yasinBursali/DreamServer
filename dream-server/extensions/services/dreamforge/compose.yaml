services:
  dreamforge:
    image: ${DREAMFORGE_IMAGE:-ghcr.io/light-heart-labs/dreamforge:latest}
    build:
      context: ./extensions/services/dreamforge
      dockerfile: Dockerfile.rust
    container_name: dream-dreamforge
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - DREAMFORGE_PORT=3010
      - DREAMFORGE_HOST=0.0.0.0
      - DREAMFORGE_MODEL=${DREAMFORGE_MODEL:-}
      - DREAMFORGE_API_KEY=${DREAMFORGE_API_KEY:-}
      - DREAMFORGE_WORKSPACE=/workspace
      - DREAMFORGE_DATA_DIR=/data/dreamforge
      - DREAMFORGE_PERMISSION_MODE=${DREAMFORGE_PERMISSION_MODE:-default}
      - DREAMFORGE_MAX_TURNS=${DREAMFORGE_MAX_TURNS:-200}
      - DREAMFORGE_COMPACT_THRESHOLD=${DREAMFORGE_COMPACT_THRESHOLD:-10000}
      - DREAMFORGE_FRONTEND_DIR=/app/frontend/dist
      - DREAMFORGE_RAG_ENABLED=${DREAMFORGE_RAG_ENABLED:-false}
      # WebSearch via SearXNG (HTML format for scraping)
      - DREAMFORGE_WEB_SEARCH_BASE_URL=http://searxng:8080/search?format=html
      # Service URLs (Docker network) — /v1 required for Rust engine
      - LLM_API_URL=${DREAMFORGE_LLM_API_URL:-http://llama-server:8080/v1}
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDINGS_URL=http://embeddings:80
      - SEARXNG_URL=http://searxng:8080
      - WHISPER_URL=http://whisper:8000
      - TTS_URL=http://tts:8880
      - DASHBOARD_API_URL=http://dashboard-api:3002
    volumes:
      - ./data/dreamforge:/data/dreamforge
      - ${DREAMFORGE_HOST_WORKSPACE:-./workspace}:/workspace
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${DREAMFORGE_PORT:-3010}:3010"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - dream-network

networks:
  dream-network:
    external: true
