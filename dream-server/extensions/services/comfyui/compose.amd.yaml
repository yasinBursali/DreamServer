services:
  comfyui:
    image: ignatberesnev/comfyui-gfx1151:v0.2
    container_name: dream-comfyui
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-992}"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    shm_size: 8g
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.1
      - PYTORCH_TUNABLEOP_ENABLED=1
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
    volumes:
      - ./data/comfyui/ComfyUI:/opt/ComfyUI
    ports:
      - "${COMFYUI_PORT:-8188}:8188"
    command: >-
      /bin/sh -c "/opt/comfyui-gfx1151-utils/check-comfyui.sh &&
      python3 /opt/ComfyUI/main.py --listen 0.0.0.0 --use-flash-attention"
    deploy:
      resources:
        limits:
          cpus: '16.0'
          memory: 96G
        reservations:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
