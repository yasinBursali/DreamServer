schema_version: dream.services.v1

service:
  id: opencode
  name: OpenCode (IDE)
  aliases: [opencode-web]
  container_name: ""
  default_host: localhost
  port: 3003
  external_port_env: OPENCODE_PORT
  external_port_default: 3003
  health: /
  type: host-systemd
  gpu_backends: [amd, nvidia]
  category: optional
  depends_on: []
  sidebar_icon: Code

features:
  - id: coding
    name: Coding Assistant
    description: AI-powered code editor in your browser
    icon: Code
    category: development
    requirements:
      services_all: [opencode]
      vram_gb: 8
    enabled_services_all: [opencode]
    setup_time: Ready
    priority: 6
    gpu_backends: [amd, nvidia]
