services:
  n8n:
    image: n8nio/n8n:2.6.4
    container_name: dream-n8n
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    security_opt:
      - no-new-privileges:true
    environment:
      - N8N_BASIC_AUTH_ACTIVE=${N8N_AUTH:-true}
      - N8N_BASIC_AUTH_USER=${N8N_USER:?N8N_USER must be set in .env}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASS:?N8N_PASS must be set in .env}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=${TIMEZONE:-UTC}
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./config/n8n:/home/node/workflows
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
